version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: zendesk-mgmt
    main: ./cmd/zendesk-mgmt
    binary: zendesk-mgmt
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.Version={{ .Version }} -X main.Commit={{ .Commit }} -X main.BuildDate={{ .Date }}
    goos:
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: zendesk-mgmt-archives
    ids:
      - zendesk-mgmt
    name_template: "zendesk-mgmt_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: relux-works
    name: skill-zendesk-management
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
